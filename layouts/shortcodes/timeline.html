<div class="timeline-container">
  {{ .Inner }}
</div>

<style>
  .timeline-container {
    position: relative;
    max-width: 800px;
    margin: 2.5rem auto;
    padding-left: 2rem;
  }

  .timeline-container::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 8px;
    width: 2px;
    background: #e5e7eb;
    border-radius: 1px;
  }

  .dark .timeline-container::before {
    background: #374151;
  }

  .timeline-item {
    position: relative;
    margin-bottom: 2rem;
    padding: 1.5rem;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(0, 0, 0, 0.04);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .timeline-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
  }

  .dark .timeline-item {
    background: #1f2228;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
  }

  .dark .timeline-item:hover {
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  }

  .timeline-dot {
    position: absolute;
    top: 1.5rem;
    left: -2rem;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4f46e5;
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    transform: translateX(1px);
    transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
  }

  .timeline-item:hover .timeline-dot {
    background: #6366f1;
    box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.25);
    transform: translateX(1px) scale(1.1);
  }

  .dark .timeline-dot {
    border-color: #1f2228;
    background: #818cf8;
    box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
  }

  .dark .timeline-item:hover .timeline-dot {
    background: #a5b4fc;
    box-shadow: 0 0 0 5px rgba(129, 140, 248, 0.25);
  }

  .timeline-avatar {
    position: absolute;
    top: 1.2rem;
    left: -44px; /* Aligns center with the 2px line at container left 8px for 40px width */
    width: 40px;
    height: 40px;
    border-radius: 50%; /* Reverted to circle */
    background: #ffffff;
    border: 1px solid #e5e7eb;
    box-shadow: 0 0 0 4px #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    z-index: 10;
  }

  .timeline-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .dark .timeline-avatar {
    border-color: #374151;
    background: #1f2228;
    box-shadow: 0 0 0 4px #1f2228;
  }

  .timeline-title {
    margin: 0 0 0.25rem 0 !important;
    font-size: 1.2rem;
    font-weight: 700;
    color: #111827;
  }

  .dark .timeline-title {
    color: #f9fafb;
  }

  .timeline-subtitle {
    font-size: 0.95rem;
    color: #374151;
    font-weight: 500;
    margin-bottom: 0.25rem;
  }

  .dark .timeline-subtitle {
    color: #d1d5db;
  }

  .timeline-company {
    font-weight: 600;
  }

  .timeline-date {
    font-size: 0.85rem;
    font-weight: 500;
    color: #6b7280;
    margin-bottom: 0.25rem;
    display: block;
  }

  .dark .timeline-date {
    color: #9ca3af;
  }

  .timeline-location {
    font-size: 0.85rem;
    color: #6b7280;
    margin-bottom: 0.75rem;
  }

  .dark .timeline-location {
    color: #9ca3af;
  }

  .timeline-body {
    font-size: 0.95rem;
    line-height: 1.6;
    color: #4b5563;
  }

  .timeline-body>*:last-child {
    margin-bottom: 0;
  }

  .timeline-body ul {
    margin-top: 0.5rem;
    padding-left: 1.25rem;
  }

  .dark .timeline-body {
    color: #9ca3af;
  }

  .timeline-tech-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
    align-items: center;
  }

  .timeline-tech-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #374151;
    margin-right: 0.25rem;
  }

  .dark .timeline-tech-label {
    color: #d1d5db;
  }

  .timeline-tech {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.15rem 0.5rem;
    background: #f3f4f6;
    color: #4b5563;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
  }

  .dark .timeline-tech {
    background: #374151;
    color: #d1d5db;
    border-color: #4b5563;
  }

  .timeline-item.connected-next::after {
    content: '';
    position: absolute;
    bottom: -2.05rem;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 2.1rem;
    background: #ffffff;
    z-index: 1;
  }

  .dark .timeline-item.connected-next::after {
    background: #1f2228;
  }
</style>
<script src="{{ "js/timeline.js" | relURL }}" defer></script>

<div class="timeline-container">
  {{ .Inner }}
</div>

<style>
  .timeline-container {
    position: relative;
    max-width: 800px;
    margin: 2.5rem auto;
    padding-left: 2rem;
  }

  .timeline-container::before {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 8px;
    /* Alignment for the dot */
    width: 2px;
    background: #e5e7eb;
    border-radius: 1px;
  }

  .dark .timeline-container::before {
    background: #374151;
  }

  .timeline-item {
    position: relative;
    margin-bottom: 2rem;
    padding: 1.5rem;
    border-radius: 12px;
    background: #ffffff;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(0, 0, 0, 0.04);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .timeline-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
  }

  .dark .timeline-item {
    /* Using a nice dark slate for harmony with standard dark themes */
    background: #1f2228;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
  }

  .dark .timeline-item:hover {
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  }

  .timeline-dot {
    position: absolute;
    top: 1.5rem;
    left: -2rem;
    /* Centers over the 2px line at left: 8px */
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4f46e5;
    /* Nice indigo accent */
    border: 3px solid #ffffff;
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    transform: translateX(1px);
    /* micro-adjustment for perfection */
    transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
  }

  .timeline-item:hover .timeline-dot {
    background: #6366f1;
    box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.25);
    transform: translateX(1px) scale(1.1);
  }

  .dark .timeline-dot {
    border-color: #1f2228;
    background: #818cf8;
    box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
  }

  .dark .timeline-item:hover .timeline-dot {
    background: #a5b4fc;
    box-shadow: 0 0 0 5px rgba(129, 140, 248, 0.25);
  }

  .timeline-date {
    font-size: 0.85rem;
    font-weight: 600;
    color: #4f46e5;
    margin-bottom: 0.5rem;
    display: inline-block;
    padding: 0.2rem 0.6rem;
    background: rgba(79, 70, 229, 0.08);
    border-radius: 9999px;
    letter-spacing: 0.025em;
  }

  .dark .timeline-date {
    color: #818cf8;
    background: rgba(129, 140, 248, 0.1);
  }

  .timeline-title {
    margin: 0 0 0.5rem 0 !important;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .timeline-body {
    font-size: 0.95rem;
    line-height: 1.6;
    color: #4b5563;
  }

  .timeline-body>*:last-child {
    margin-bottom: 0;
  }

  .timeline-body ul {
    margin-top: 0.5rem;
    padding-left: 1.25rem;
  }

  .dark .timeline-body {
    color: #9ca3af;
  }

  .timeline-tech-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .timeline-tech {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.15rem 0.5rem;
    background: #f3f4f6;
    color: #4b5563;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
  }

  .dark .timeline-tech {
    background: #374151;
    color: #d1d5db;
    border-color: #4b5563;
  }
</style>
